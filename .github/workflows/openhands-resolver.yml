# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  LORAPOK MORPHEUS — Issue Resolver                                         ║
# ║  "From issue to pull request, autonomously."                               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Uses the official OpenHands reusable workflow to resolve issues labeled 'fix-me'.
# Can also be triggered by commenting '@openhands-agent' on an issue.
#
# Required Secrets (Settings → Secrets → Actions):
#   LLM_API_KEY   — Your LLM provider API key
#   PAT_TOKEN     — Personal access token with contents, issues, PRs, workflows scope
#   PAT_USERNAME  — GitHub username for the PAT
#
# Optional Variables (Settings → Variables → Actions):
#   LLM_MODEL     — Model name (default: google/gemini-2.5-flash)

name: "Lorapok Morpheus — Issue Resolver"

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  morpheus:
    uses: All-Hands-AI/OpenHands/.github/workflows/openhands-resolver.yml@main
    with:
      macro: "@openhands-agent"
      max_iterations: 50
      LLM_MODEL: ${{ vars.LLM_MODEL || 'google/gemini-2.5-flash' }}
      target_branch: "main"
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      PAT_USERNAME: ${{ secrets.PAT_USERNAME }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
