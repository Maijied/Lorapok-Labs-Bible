# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  LORAPOK MORPHEUS — Issue Resolver                                         ║
# ║  "From issue to pull request, autonomously."                               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Uses the OpenHands container (from ghcr.io) to resolve issues labeled 'fix-me'.
# Runs via docker run on the host so the resolver can spawn its own runtime containers.
#
# Required Secrets (Settings → Secrets → Actions):
#   LLM_API_KEY   — Your LLM provider API key
#   LLM_MODEL     — Model name (default: google/gemini-2.5-flash)

name: "Lorapok Morpheus — Issue Resolver"

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  morpheus:
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '@openhands-agent'))
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Run Morpheus (OpenHands Resolver)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'google/gemini-2.5-flash' }}
        run: |
          docker run --rm \
            --privileged \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/workspace \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            -e LLM_API_KEY="$LLM_API_KEY" \
            -e LLM_MODEL="$LLM_MODEL" \
            -w /workspace \
            ghcr.io/all-hands-ai/openhands:0.27 \
            python -m openhands.resolver.resolve_issue \
              --repo "${{ github.repository }}" \
              --issue-number "${{ github.event.issue.number }}" \
              --token "$GITHUB_TOKEN" \
              --username "${{ github.repository_owner }}" \
              --llm-model "$LLM_MODEL" \
              --llm-api-key "$LLM_API_KEY" \
              --issue-type issue \
              --repo-instruction-file "/workspace/.openhands/instructions.md"

      - name: "Morpheus Complete"
        if: always()
        run: |
          echo ""
          echo "  ╔══════════════════════════════════════════════════╗"
          echo "  ║  LORAPOK MORPHEUS — Resolution Attempted        ║"
          echo "  ╚══════════════════════════════════════════════════╝"
          echo ""
