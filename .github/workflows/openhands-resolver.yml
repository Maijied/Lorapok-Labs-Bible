# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  LORAPOK MORPHEUS — Issue Resolver                                         ║
# ║  "From issue to pull request, autonomously."                               ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# Uses the OpenHands resolver (pip package) to automatically resolve issues
# labeled with 'fix-me'. No external GitHub Action needed.
#
# Required Secrets (Settings → Secrets → Actions):
#   LLM_API_KEY   — Your LLM provider API key
#   LLM_MODEL     — Model name (default: google/gemini-2.5-flash)
#
# Docs: https://pypi.org/project/openhands-resolver/

name: "Lorapok Morpheus — Issue Resolver"

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  morpheus:
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'fix-me') ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '@openhands-agent'))
    runs-on: ubuntu-latest

    steps:
      - name: "◈ Checkout repository"
        uses: actions/checkout@v4

      - name: "◈ Setup Python 3.12"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "◈ Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: "◈ Install app dependencies"
        run: npm ci
        working-directory: app

      - name: "◈ Install OpenHands Resolver"
        run: pip install openhands-resolver

      - name: "◈ Run Morpheus (OpenHands Resolver)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'google/gemini-2.5-flash' }}
        run: |
          python -m openhands_resolver.resolve_issue \
            --repo "${{ github.repository }}" \
            --issue-number "${{ github.event.issue.number }}" \
            --token "$GITHUB_TOKEN" \
            --llm-api-key "$LLM_API_KEY" \
            --llm-model "$LLM_MODEL" \
            --instructions "You are Morpheus, the Autonomous Issue Resolver for Lorapok Labs.

          CRITICAL CONTEXT:
          - The app lives in app/, NOT the repo root. Run npm commands from app/.
          - React 19 + TypeScript + Vite 8 + HashRouter (GitHub Pages).
          - Styling: CSS Modules + design tokens (app/src/styles/tokens.css).
          - Icons: Lucide React (PascalCase names).
          - Check .lorapok/playbooks/ for step-by-step recipes.

          BEFORE OPENING A PR, you MUST pass all three gates:
          1. node .lorapok/scripts/brand-guard.mjs (from repo root)
          2. cd app && npm run lint
          3. npm run build

          GUARDRAILS:
          - No BrowserRouter (use HashRouter only).
          - No Tailwind, no CSS-in-JS (styled-components/Emotion).
          - No backend deps (express/fastify/koa).
          - No any type without // brand-guard-ignore comment.
          - Data belongs in app/src/data/*.ts, not hardcoded in pages.
          - Components use arrow functions with typed Props (no React.FC).

          PR FORMAT:
          - Branch: fix/<issue-slug>
          - Title: fix: <concise description>
          - Body: Reference issue with Closes #<number>"

      - name: "◈ Morpheus Complete"
        if: always()
        run: |
          echo ""
          echo "  ╔══════════════════════════════════════════════════╗"
          echo "  ║  ◈ LORAPOK MORPHEUS — Resolution Attempted      ║"
          echo "  ║  Check the opened PR for the proposed fix.      ║"
          echo "  ╚══════════════════════════════════════════════════╝"
          echo ""
