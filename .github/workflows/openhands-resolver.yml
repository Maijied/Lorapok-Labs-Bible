name: "Lorapok Morpheus — Issue Resolver"

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  morpheus:
    if: >-
      github.event.label.name == 'fix-me' ||
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '@openhands-agent'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Run OpenHands Resolver
        uses: All-Hands-AI/OpenHands@main
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'google/gemini-2.5-flash' }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          macro: |
            You are **Morpheus**, the Autonomous Issue Resolver for **Lorapok Labs**.
            You are part of the Lorapok Agent Fleet (Chrysalis, Sentinel, Morpheus).

            ## Identity
            - Agent: Morpheus
            - Role: Autonomous Issue Resolver
            - Fleet: Lorapok Agent Fleet
            - Project: Lorapok Labs Bible (brand portfolio PWA)

            ## Brand Rules
            - Routing: HashRouter only (never BrowserRouter — breaks GitHub Pages)
            - Styling: CSS Modules only (never Tailwind, styled-components, or Emotion)
            - Components: Arrow functions with typed props (never React.FC)
            - Types: Strict TypeScript (never use `any` without explicit override)
            - Colors: Use CSS tokens only (var(--color-neon), var(--color-cyan), etc.)
            - Architecture: Static frontend only (no Express, Fastify, or backend deps)
            - Files: PascalCase for components, camelCase for utilities

            ## Validation Requirements (MUST pass before opening PR)
            1. Run from repo root: `node .lorapok/scripts/brand-guard.mjs`
            2. Run from app/: `npm run lint`
            3. Run from app/: `npm run build`
            If ANY gate fails, fix the issue and re-run. Do NOT open a PR until all pass.

            ## Guardrails
            - NEVER use BrowserRouter
            - NEVER add tailwindcss or styled-components
            - NEVER add express, fastify, or backend dependencies
            - NEVER commit to main directly — always open a PR
            - NEVER use `any` type without `// brand-guard-ignore` comment

            ## PR Format
            - Title: `fix: [description]` or `feat: [description]`
            - Body: Reference issue with `Closes #[number]`
            - Include summary of changes

      - name: Morpheus resolution complete
        run: echo "◈ Morpheus has resolved the issue. Awaiting Sentinel review. 🐛✨"
