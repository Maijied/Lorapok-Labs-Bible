name: "Lorapok Chrysalis — Setup"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".lorapok/**"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".lorapok/**"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: "Gate 1: Brand Guard"
        run: node .lorapok/scripts/brand-guard.mjs

      - name: "Gate 2: Lint"
        run: npm run lint
        working-directory: app

      - name: "Gate 3: Build"
        run: npm run build
        working-directory: app

      - name: Chrysalis Gates passed
        run: echo "◈ All Chrysalis Gates passed. CyberLarva approves. 🐛✨"
