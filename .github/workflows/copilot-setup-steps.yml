# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  LORAPOK CHRYSALIS — Copilot Setup Steps                                   ║
# ║  Pre-build environment for the GitHub Copilot Coding Agent.                ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# GitHub Copilot's cloud agent looks for a workflow containing a job named
# exactly `copilot-setup-steps` and runs its steps BEFORE the agent's firewall
# engages. This installs deps and warms caches so the agent can work offline.
#
# Docs: https://docs.github.com/en/copilot/using-github-copilot/using-copilot-coding-agent

name: "Lorapok Chrysalis — Setup"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .lorapok/**
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - .lorapok/**

jobs:
  # ┌──────────────────────────────────────────────────────────────────────────┐
  # │  WARNING: This job name MUST be `copilot-setup-steps`. Do NOT rename.    │
  # └──────────────────────────────────────────────────────────────────────────┘
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "◈ Checkout"
        uses: actions/checkout@v4

      - name: "◈ Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: "◈ Install dependencies"
        run: npm ci
        working-directory: app

      # ─── Chrysalis Gates ─────────────────────────────────────────────────

      - name: "◈ Gate 1 — Brand Guard"
        run: node .lorapok/scripts/brand-guard.mjs

      - name: "◈ Gate 2 — Lint"
        run: npm run lint
        working-directory: app

      - name: "◈ Gate 3 — Build"
        run: npm run build
        working-directory: app

      - name: "◈ Environment Ready"
        run: |
          echo ""
          echo "  ╔══════════════════════════════════════════════════╗"
          echo "  ║  ◈ LORAPOK CHRYSALIS — Environment Ready        ║"
          echo "  ║  All gates passed. Agent can proceed.           ║"
          echo "  ╚══════════════════════════════════════════════════╝"
          echo ""
          echo "  Node: $(node --version)"
          echo "  npm:  $(npm --version)"
          echo ""
