apiVersion: lorapok.dev/v1
kind: AgentFleet

metadata:
  name: lorapok-agent-fleet
  version: 1.0.0
  description: >-
    The Lorapok Agent Fleet — a trio of AI agents that build, review, and resolve
    issues for the Lorapok Labs Bible project autonomously.
  tagline: "Building the Future. One Line at a Time."
  author: Mohammad Maizied Hasan Majumder
  license: MIT
  repository: https://github.com/Maijied/Lorapok-Labs-Bible
  homepage: https://maijied.github.io/Lorapok-Labs-Bible/

brand:
  organization: Lorapok Labs
  mission: "Products That Feel Alive."
  themes:
    - Biological UI
    - Neon-on-Dark Glassmorphism
    - Cyber-Industrial Aesthetic
    - Open Source Ecosystem
  aesthetic:
    palette:
      neon-green: "#00ff88"
      cyan: "#00e5ff"
      dark-surface: "#0a0a0a"
      glass-bg: "rgba(255, 255, 255, 0.03)"
      accent-blue: "#38bdf8"
    mascot: CyberLarva
    font: system-ui
    border-radius: 12px

agents:
  - id: chrysalis
    name: Chrysalis
    role: Brand-Compliant Builder
    description: >-
      Transforms tasks into production-ready code that adheres to the Lorapok Labs
      brand system. Executes structured playbooks and validates through Chrysalis Gates.
    platforms:
      - GitHub Copilot
      - Claude
      - GPT-4o
      - Gemini
      - Ollama
      - Any LLM
    config: .github/copilot-instructions.md
    documentation: .lorapok/agents/chrysalis.md

  - id: sentinel
    name: Sentinel
    role: AI Code Reviewer
    description: >-
      Automatically reviews every pull request with path-specific intelligence.
      Enforces brand compliance, architecture patterns, security, and performance.
    platforms:
      - CodeRabbit
    config: .coderabbit.yaml
    documentation: .lorapok/agents/sentinel.md

  - id: morpheus
    name: Morpheus
    role: Autonomous Issue Resolver
    description: >-
      Reads GitHub issues, understands the codebase, implements fixes, runs validation,
      and opens pull requests — all without human intervention.
    platforms:
      - OpenHands
      - GitHub Actions
    config: .github/workflows/openhands-resolver.yml
    documentation: .lorapok/agents/morpheus.md

capabilities:
  runtime:
    node: 20
    package-manager: npm
    working-directory: app/
  validation:
    - name: brand-guard
      command: node .lorapok/scripts/brand-guard.mjs
      cwd: "."
    - name: lint
      command: npm run lint
      cwd: app/
    - name: build
      command: npm run build
      cwd: app/
  playbooks:
    catalog:
      - add-page
      - add-product
      - add-data-entry
      - refactor-component
    path: .lorapok/playbooks/

guardrails:
  forbidden-patterns:
    - BrowserRouter
    - tailwindcss
    - styled-components
    - express
    - fastify
  forbidden-files:
    - dist/
    - node_modules/

ecosystem:
  website: https://lorapok.github.io
  github-org: https://github.com/Lorapok
  linkedin: https://www.linkedin.com/showcase/lorapok/
  reddit: https://www.reddit.com/r/LorapokLabs/
  instagram: https://www.instagram.com/lorapoklabs/
  facebook: https://www.facebook.com/lorapoklabs
  products:
    - name: Lorapok Atlas
      url: https://producthunt.com/products/lorapok-atlas-api-directory
    - name: Roast as a Service
      url: https://lorapok.github.io
    - name: Ollama Chat
      url: https://lorapok.github.io
    - name: Lorapok AI Agent
      url: https://lorapok.github.io
    - name: Lorapok Laravel Monitor
      url: https://lorapok.github.io
    - name: TabMan
      url: https://lorapok.github.io
    - name: BrainSpark
      url: https://lorapok.github.io
