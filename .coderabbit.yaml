# ◈ Sentinel — CodeRabbit Configuration
# AI Code Reviewer for the Lorapok Agent Fleet
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US

tone_instructions: >
  You are Sentinel, the AI Code Reviewer for Lorapok Labs. Be assertive and thorough.
  Enforce the Biological UI brand system strictly: neon-on-dark glassmorphism, design
  tokens, CSS Modules. Reject violations without hesitation.

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  sequence_diagrams: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_instructions:
    - path: "app/src/components/**"
      instructions: |
        Review components for:
        - CSS Modules usage (colocated .module.css file required)
        - Design tokens only — no hardcoded colors (use var(--color-*), var(--space-*))
        - Accessibility: semantic HTML, aria labels where needed, keyboard navigable
        - No React.FC — use arrow functions with typed Props interface
        - Framer Motion for animations (not CSS transitions for enter/exit)
        - Accept optional className prop for composability
        - Use cn() utility for conditional class merging

    - path: "app/src/pages/**"
      instructions: |
        Review pages for:
        - No hardcoded content data — all data from app/src/data/ files
        - HashRouter compatible paths (no assumptions about BrowserRouter)
        - Framer Motion page transitions (motion.main wrapper)
        - Lazy loading via React.lazy() in App.tsx
        - Colocated CSS Module with token-based styles

    - path: "app/src/data/**"
      instructions: |
        Review data files for:
        - Full type compliance with interfaces in app/src/types/index.ts
        - Lucide React icon names in PascalCase (valid exports from lucide-react)
        - HTTPS URLs only (no http://)
        - No duplicate IDs within arrays
        - Proper status values ('active' | 'beta' | 'archived' for products)

    - path: "app/src/styles/**"
      instructions: |
        Review stylesheets for:
        - Token integrity — all custom properties follow naming convention (--color-*, --space-*, --radius-*, --font-size-*)
        - Dark-theme first approach (light backgrounds are violations)
        - No hardcoded hex/rgb values — use custom properties
        - Animation performance (prefer transform/opacity for GPU acceleration)
        - No Tailwind utilities, no @apply directives

    - path: ".lorapok/**"
      instructions: |
        Review fleet configuration for:
        - YAML schema validity (chrysalis.yml follows apiVersion/kind/metadata pattern)
        - Playbook structure (trigger, pre-conditions, checklist, post-conditions, validation)
        - Script correctness (brand-guard.mjs patterns and rules)
        - Agent documentation accuracy

    - path: "app/package.json"
      instructions: |
        Review package.json for:
        - No forbidden dependencies: tailwindcss, styled-components, @emotion/*, express, fastify, koa, hono, next, nuxt
        - React 19+ and react-dom 19+
        - Vite 8+ as dev dependency
        - No unnecessary bloat — this is a static site

chat:
  auto_reply: true

path_filters:
  - "!app/package-lock.json"
  - "!**/dist/**"
  - "!**/*.min.js"
  - "!**/*.min.css"

knowledge_base:
  learnings:
    scope: auto
  opt_out: false
